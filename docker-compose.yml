# Tailscale exit node whose egress is routed through a Private Internet Access
# WireGuard tunnel. One node pair per invocation, fully parameterised by env so
# the same file spins up as many regions as you like via `-p <project>`.
#
#   docker compose -p pia-nz --env-file envs/nz.env up -d
#
# The tailscale container shares the wireguard container's network namespace, so
# every packet Tailscale sends (control plane, DERP, and all exit-node traffic)
# leaves the host through the PIA tunnel.

services:
  wireguard:
    image: thrnz/docker-wireguard-pia:latest
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      # PIA account + region (all region ids: docs/regions.md)
      LOC: ${PIA_LOC:?set PIA_LOC in your env file}
      USER: ${PIA_USER:?set PIA_USER in your env file}
      PASS: ${PIA_PASS:?set PIA_PASS in your env file}
      # Allow direct (non-tunnelled) access to your LAN so the container stays
      # manageable and can resolve local hosts. Leave empty to send everything
      # through PIA.
      LOCAL_NETWORK: ${LAN_NETWORK:-}
      # DNS used inside the tunnel.
      VPNDNS: ${VPN_DNS:-8.8.8.8,8.8.4.4}
      # Kill switch on: if the tunnel drops, no traffic leaks to the raw uplink.
      FIREWALL: "1"
      # We are not torrenting here, so no port forwarding.
      PORT_FORWARDING: "0"
      KEEPALIVE: "25"
    sysctls:
      # Required so the shared namespace will forward exit-node traffic.
      # v6 forwarding is needed only to satisfy Tailscale's health check
      # (--advertise-exit-node advertises ::/0 too); PIA tunnels are v4-only,
      # so no v6 traffic actually egresses. Delete the v6 line if your host
      # runs with IPv6 fully disabled.
      net.ipv4.ip_forward: "1"
      net.ipv6.conf.all.forwarding: "1"
    volumes:
      - pia:/pia
      - pia-shared:/pia-shared
    healthcheck:
      # Gate the tailscale sidecar until the tunnel actually carries traffic.
      test: ["CMD-SHELL", "ping -c 1 -W 5 1.1.1.1 >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  tailscale:
    image: tailscale/tailscale:latest
    # Ride the wireguard container's netns: Tailscale's uplink IS the PIA tunnel.
    network_mode: service:wireguard
    depends_on:
      wireguard:
        condition: service_healthy
    cap_add:
      # Kernel networking mode: tailscaled programs its own TUN device,
      # iptables chains, and policy routes inside the shared namespace.
      - NET_ADMIN
      - NET_RAW
    devices:
      - /dev/net/tun:/dev/net/tun
    # The PIA image's kill switch lives in the nftables backend with default
    # DROP policies, and it only knows its own wg-quick fwmark. Kernel-mode
    # tailscaled needs four holes punched in it, and they MUST be punched with
    # iptables-nft (the tailscale image's plain `iptables` is the legacy
    # backend, whose rules the kill switch never sees):
    #   1. OUTPUT: tailscaled fwmarks its transport (0x80000) to bypass the
    #      exit route, standard Tailscale behaviour (control plane / DERP /
    #      peer WireGuard use the raw uplink; payload still only leaves via
    #      wg0). Without this the node sits permanently logged out.
    #   2-4. INPUT/FORWARD for tailscale0: an ACCEPT in tailscaled's own
    #      firewall table cannot override the PIA table's FORWARD DROP (every
    #      nft hook chain gets a vote; any drop wins), so exit-node traffic
    #      must be accepted in the same table the DROP policy lives in.
    # All idempotent; harmless no-ops in userspace mode.
    entrypoint:
      - /bin/sh
      - -c
      - |
        IPT="$$(command -v iptables-nft || command -v iptables)"
        add() { "$$IPT" -C "$$@" 2>/dev/null || "$$IPT" -I "$$@" 2>/dev/null || true; }
        add OUTPUT -m mark --mark 0x80000/0xff0000 -j ACCEPT
        add INPUT -i tailscale0 -j ACCEPT
        add FORWARD -i tailscale0 -j ACCEPT
        add FORWARD -o tailscale0 -j ACCEPT
        exec /usr/local/bin/containerboot
    environment:
      TS_HOSTNAME: ${TS_HOSTNAME:-pia-exit}
      # Leave TS_AUTHKEY empty to authenticate via the interactive login URL
      # printed to `docker logs`. Set it to a reusable/tagged key for hands-off
      # (re)deploys.
      TS_AUTHKEY: ${TS_AUTHKEY:-}
      TS_STATE_DIR: /var/lib/tailscale
      # Kernel-mode forwarding by default: exit-node traffic is routed by the
      # kernel instead of being re-originated by a userspace TCP stack, which
      # roughly doubles throughput (see docs/how-it-works.md#performance).
      # Set TS_USERSPACE=true in your env file if your host cannot grant the
      # caps/TUN device above.
      TS_USERSPACE: ${TS_USERSPACE:-false}
      # Do not let MagicDNS override the tunnel's resolver (avoids DNS leaks).
      TS_ACCEPT_DNS: "false"
      # Force the same netfilter backend the PIA image uses. Left to
      # auto-detect, tailscaled can pick iptables-legacy while the PIA rules
      # live in nftables; the kernel then evaluates BOTH rule sets and the PIA
      # side's FORWARD DROP policy silently eats all forwarded exit traffic.
      TS_DEBUG_FIREWALL_MODE: nftables
      TS_EXTRA_ARGS: --advertise-exit-node
    volumes:
      - tailscale:/var/lib/tailscale
    restart: unless-stopped

volumes:
  pia:
  pia-shared:
  tailscale:
